<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#06020f"/>
    </linearGradient>

    <!-- Graphic Accents Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7f00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Decorative Glowing Circles -->
  <circle cx="200" cy="100" r="150" fill="#7f00ff" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1000" cy="300" r="180" fill="#00f0ff" opacity="0.1" filter="url(#glow)"/>

  <!-- Conceptual Graphic: Multimodal Fusion (Image + Text -> Answer) -->
  <g transform="translate(80, 50)" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1">
    <!-- Camera/Lens Symbolism -->
    <circle cx="920" cy="130" r="70" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="920" cy="130" r="35" fill="none" stroke="#00f0ff" stroke-width="2"/>
    <path d="M 850 130 L 780 130" stroke="#00f0ff" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M 990 130 L 1040 130" stroke="#ff007f" stroke-width="2" stroke-dasharray="5 5"/>
    
    <!-- Binary / Network Nodes -->
    <g stroke-opacity="0.4" stroke-width="1.5">
      <line x1="720" y1="180" x2="780" y2="130" stroke="#7f00ff"/>
      <line x1="720" y1="80" x2="780" y2="130" stroke="#7f00ff"/>
      <line x1="780" y1="130" x2="850" y2="130" stroke="#00f0ff" stroke-width="3"/>
      
      <circle cx="720" cy="80" r="8" fill="#ff007f"/>
      <circle cx="720" cy="180" r="8" fill="#00f0ff"/>
      <circle cx="780" cy="130" r="12" fill="#7f00ff" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Typography & Title -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Subtitle / Category Badge -->
    <rect x="80" y="95" width="220" height="32" rx="16" fill="url(#accentGrad)" opacity="0.9"/>
    <text x="190" y="116" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="1.5" text-anchor="middle">AWESOME CURATION</text>

    <!-- Main Title -->
    <text x="80" y="200" font-size="54" font-weight="900" fill="#ffffff" letter-spacing="-1">
      Visual Question Answering
    </text>
    
    <!-- Accent Line -->
    <rect x="80" y="225" width="480" height="6" rx="3" fill="url(#accentGrad)" filter="url(#glow)"/>

    <!-- Description -->
    <text x="80" y="275" font-size="18" fill="#a0aec0" font-weight="400" letter-spacing="0.5">
      A curated landscape of VQA evolution, tasks, modalities, &amp; applications.
    </text>

    <!-- Badges/Tech Tags -->
    <g transform="translate(80, 315)" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="110" height="26" rx="6" fill="#1e1e2e" stroke="#7f00ff" stroke-width="1.5"/>
      <text x="55" y="17" text-anchor="middle" fill="#f5c2e7">MULTIMODAL</text>

      <!-- Tag 2 -->
      <rect x="125" y="0" width="80" height="26" rx="6" fill="#1e1e2e" stroke="#00f0ff" stroke-width="1.5"/>
      <text x="165" y="17" text-anchor="middle" fill="#89b4fa">VISION</text>

      <!-- Tag 3 -->
      <rect x="220" y="0" width="60" height="26" rx="6" fill="#1e1e2e" stroke="#ff007f" stroke-width="1.5"/>
      <text x="250" y="17" text-anchor="middle" fill="#f38ba8">NLP</text>
    </g>
  </g>
</svg>
